async function makePDF(r) {
    if (!window.jspdf) {
        alert("PDF kütüphanesi yükleniyor, lütfen bekleyin...");
        return;
    }
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: "mm", format: "a4" });
    const W = 210, M = 20, CW = 170;
    let y = M;
    const add = (txt, sz, bold, clr) => {
        doc.setFontSize(sz);
        doc.setFont("helvetica", bold ? "bold" : "normal");
        if (clr)
            doc.setTextColor(...clr);
        else
            doc.setTextColor(26, 18, 9);
        const ls = doc.splitTextToSize(String(txt || ""), CW);
        doc.text(ls, M, y);
        y += ls.length * (sz * 0.4) + 2;
        if (y > 270) {
            doc.addPage();
            y = M;
        }
    };
    doc.setFillColor(26, 18, 9);
    doc.rect(0, 0, W, 36, "F");
    doc.setTextColor(245, 230, 200);
    doc.setFontSize(20);
    doc.setFont("helvetica", "bold");
    doc.text(r.name, M, 18);
    doc.setFontSize(10);
    doc.setFont("helvetica", "normal");
    doc.text(r.cat + " · " + r.founded, M, 28);
    y = 46;
    add("AÇIKLAMA", 9, true, [139, 37, 0]);
    add(r.desc, 11);
    y += 3;
    add("İNANÇ ESASLARI", 9, true, [139, 37, 0]);
    (r.beliefs || []).forEach(b => add("• " + b, 10));
    y += 3;
    add("İBADET VE PRATİKLER", 9, true, [139, 37, 0]);
    (r.practices || []).forEach(p => add("• " + p, 10));
    y += 3;
    add("TARİHSEL GELİŞİM", 9, true, [139, 37, 0]);
    add(r.history, 11);
    y += 3;
    add("BİLGİLER", 9, true, [139, 37, 0]);
    [["Kurucusu", r.founder], ["Bölge", r.region], ["Mensup", r.followers], ["Kutsal Kitap", r.holyBook]].forEach(([k, v]) => add(k + ": " + v, 10));
    doc.setFontSize(7);
    doc.setTextColor(150, 130, 100);
    doc.text("Dinler Tarihi Ansiklopedisi", M, 290);
    doc.save(r.name.toLowerCase().replace(/\s/g, "-") + ".pdf");
}
async function makeArticlePDF(a) {
    if (!window.jspdf) {
        alert("PDF kütüphanesi yükleniyor, lütfen bekleyin...");
        return;
    }
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: "mm", format: "a4" });
    const W = 210, M = 22, CW = 166;
    let y = M;
    const add = (txt, sz, bold, clr, maxW) => {
        doc.setFontSize(sz);
        doc.setFont("helvetica", bold ? "bold" : "normal");
        if (clr)
            doc.setTextColor(...clr);
        else
            doc.setTextColor(26, 18, 9);
        const ls = doc.splitTextToSize(String(txt || ""), maxW || CW);
        doc.text(ls, M, y);
        y += ls.length * (sz * 0.42) + 1.5;
        if (y > 278) {
            doc.addPage();
            y = M;
        }
    };
    // Üst başlık bandı
    doc.setFillColor(26, 18, 9);
    doc.rect(0, 0, W, 42, "F");
    doc.setTextColor(245, 230, 200);
    doc.setFontSize(18);
    doc.setFont("helvetica", "bold");
    const titleLines = doc.splitTextToSize(a.title, W - 40);
    doc.text(titleLines, M, 18);
    doc.setFontSize(9);
    doc.setFont("helvetica", "normal");
    doc.setTextColor(180, 160, 120);
    doc.text(`${a.cat} · ${a.author} · ${a.date}`, M, 38);
    y = 54;
    // Özet kutusu
    doc.setFillColor(245, 240, 232);
    doc.rect(M - 2, y - 4, CW + 4, 0, "S");
    doc.setDrawColor(139, 37, 0);
    doc.setLineWidth(0.8);
    doc.line(M - 2, y - 4, M - 2, y + 20);
    add(a.summary, 11, false, [90, 50, 20]);
    y += 4;
    // Çizgi
    doc.setDrawColor(212, 201, 168);
    doc.setLineWidth(0.4);
    doc.line(M, y, W - M, y);
    y += 6;
    // İçerik
    doc.setTextColor(26, 18, 9);
    const paragraphs = (a.content || "").split("\n").filter(p => p.trim());
    paragraphs.forEach(p => {
        add(p, 11, false, null);
        y += 3;
    });
    // Alt yazı
    doc.setFontSize(7);
    doc.setTextColor(150, 130, 100);
    doc.text("Dinler Tarihi Ansiklopedisi — dinlertarihiansiklopedisi@gmail.com", M, 290);
    const safeName = a.title.toLowerCase().replace(/[^a-z0-9ğüşıöçğüşıöç]/gi, "-").slice(0, 40);
    doc.save("makale-" + safeName + ".pdf");
}
